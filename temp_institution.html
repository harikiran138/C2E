<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Basic Institution Details</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-[480px] mx-auto bg-white dark:bg-slate-900 shadow-xl">
<!-- Header -->
<header class="flex items-center bg-white dark:bg-slate-900 px-4 py-4 border-b border-slate-100 dark:border-slate-800 shrink-0">
<div class="text-primary flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">chevron_left</span>
</div>
<h1 class="text-[#0d141b] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">
                Basic Institution Details
            </h1>
</header>
<main class="flex-1 overflow-y-auto pb-24">
<!-- Autonomous Status Segmented Toggle -->
<div class="p-4">
<p class="text-[#0d141b] dark:text-slate-200 text-sm font-semibold leading-normal mb-3">Autonomous Status</p>
<div class="flex h-11 w-full items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 transition-all duration-200 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-500 dark:text-slate-400 text-sm font-semibold">
<span class="truncate">Autonomous</span>
<input checked="" class="invisible w-0" name="status" type="radio" value="Autonomous"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 transition-all duration-200 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-500 dark:text-slate-400 text-sm font-semibold">
<span class="truncate">Non-autonomous</span>
<input class="invisible w-0" name="status" type="radio" value="Non-autonomous"/>
</label>
</div>
</div>
<!-- Text Areas -->
<div class="px-4 space-y-5">
<label class="flex flex-col w-full">
<p class="text-[#0d141b] dark:text-slate-200 text-sm font-semibold leading-normal pb-2">Vision Statement</p>
<textarea class="form-input flex w-full resize-none overflow-hidden rounded-xl text-[#0d141b] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary min-h-[120px] placeholder:text-slate-400 p-4 text-sm font-normal leading-relaxed" placeholder="Enter the institution's vision statement..."></textarea>
</label>
<label class="flex flex-col w-full">
<p class="text-[#0d141b] dark:text-slate-200 text-sm font-semibold leading-normal pb-2">Mission Statement</p>
<textarea class="form-input flex w-full resize-none overflow-hidden rounded-xl text-[#0d141b] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary min-h-[120px] placeholder:text-slate-400 p-4 text-sm font-normal leading-relaxed" placeholder="Enter the institution's mission statement..."></textarea>
</label>
</div>
<div class="h-4"></div>
<!-- Programs Section Header -->
<div class="px-4 py-4 flex items-center justify-between border-t border-slate-100 dark:border-slate-800 mt-2">
<h2 class="text-[#0d141b] dark:text-white text-lg font-bold">Programs Offered</h2>
<button class="bg-primary/10 text-primary px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 hover:bg-primary hover:text-white transition-colors">
<span class="material-symbols-outlined text-sm">add</span>
                    Add Program
                </button>
</div>
<!-- Programs Table/List -->
<div class="px-4">
<div class="overflow-x-auto rounded-xl border border-slate-100 dark:border-slate-800">
<table class="w-full text-left border-collapse">
<thead>
<tr class="bg-slate-50 dark:bg-slate-800/50">
<th class="px-3 py-3 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Name</th>
<th class="px-3 py-3 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Degree</th>
<th class="px-3 py-3 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Years</th>
<th class="px-3 py-3 text-[10px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Level</th>
</tr>
</thead>
<tbody class="divide-y divide-slate-100 dark:divide-slate-800">
<tr>
<td class="px-3 py-4 text-sm font-medium text-[#0d141b] dark:text-slate-200">Comp. Science</td>
<td class="px-3 py-4 text-sm text-slate-600 dark:text-slate-400">B.Tech</td>
<td class="px-3 py-4 text-sm text-slate-600 dark:text-slate-400">4</td>
<td class="px-3 py-4 text-sm">
<span class="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-2 py-0.5 rounded text-[10px] font-bold">UG</span>
</td>
</tr>
<tr>
<td class="px-3 py-4 text-sm font-medium text-[#0d141b] dark:text-slate-200">Data Science</td>
<td class="px-3 py-4 text-sm text-slate-600 dark:text-slate-400">M.Tech</td>
<td class="px-3 py-4 text-sm text-slate-600 dark:text-slate-400">2</td>
<td class="px-3 py-4 text-sm">
<span class="bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 px-2 py-0.5 rounded text-[10px] font-bold">PG</span>
</td>
</tr>
<tr>
<td class="px-3 py-4 text-sm font-medium text-[#0d141b] dark:text-slate-200">Business Admin</td>
<td class="px-3 py-4 text-sm text-slate-600 dark:text-slate-400">BBA</td>
<td class="px-3 py-4 text-sm text-slate-600 dark:text-slate-400">3</td>
<td class="px-3 py-4 text-sm">
<span class="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-2 py-0.5 rounded text-[10px] font-bold">UG</span>
</td>
</tr>
</tbody>
</table>
</div>
</div>
</main>
<!-- Sticky Bottom Save Action -->
<div class="absolute bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-t border-slate-100 dark:border-slate-800">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-primary/20 active:scale-[0.98]">
                Save Changes
            </button>
</div>
</div>
</body></html>
